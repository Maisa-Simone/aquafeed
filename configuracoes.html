<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - AQUAFEED</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="topo">
    <img src="images/logo.png" alt="Logo AquaFeed">
</header>

<main class="configuracoes">

    <h1>Configurações</h1>

    <div class="card-config">

        <div class="foto-perfil">
            👤
        </div>

        <button class="btn-config">
            Alterar foto do perfil
        </button>

    </div>



    <div class="card-config">

        <h3>Nome do perfil</h3>

        <input type="text" placeholder="Digite seu nome">

        <button class="btn-config">
            Salvar nome
        </button>

    </div>



    <div class="card-config">

        <h3>LGPD</h3>

        <button class="btn-config">
            Política de Privacidade
        </button>

        <button class="btn-config">
            Termos de Uso
        </button>

    </div>



    <div class="card-config excluir">

        <button class="btn-excluir">
            Apagar conta
        </button>

    </div>

</main>
